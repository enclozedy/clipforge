server {
    listen 80;
    server_name clip.visionsec.tech;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name clip.visionsec.tech;

    # SSL (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/clip.visionsec.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clip.visionsec.tech/privkey.pem;

    client_max_body_size 500M;

    # Frontend (static)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long operations (whisper transcription)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Clips (static files)
    location /clips/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        expires 1h;
    }
}
